      c.beginPath();
      const points = 8;
      for (let i = 0; i < points; i++) {
        const angle = (i / points) * Math.PI * 2;
        const radius = a.size / 2 * (0.8 + Math.sin(i * 2.3) * 0.2);
        const px = Math.cos(angle) * radius;
        const py = Math.sin(angle) * radius;
        if (i === 0) c.moveTo(px, py);
        else c.lineTo(px, py);
      }
      c.closePath();
      c.fill();
      c.stroke();

      // Craters
      c.fillStyle = '#6a5a4a';
      c.beginPath();
      c.arc(-a.size * 0.2, -a.size * 0.1, a.size * 0.15, 0, Math.PI * 2);
      c.fill();
      c.beginPath();
      c.arc(a.size * 0.15, a.size * 0.2, a.size * 0.1, 0, Math.PI * 2);
      c.fill();

      c.restore();
    }

    // Draw bullets
    c.fillStyle = '#ffff00';
    c.strokeStyle = '#ffa500';
    c.lineWidth = 1;
    for (const b of this.bullets) {
      c.beginPath();
      c.arc(b.x, b.y, 4, 0, Math.PI * 2);
      c.fill();
      c.stroke();
    }

    // Draw particles
    drawParticles(c);

    // Draw Yasmin
    c.save();
    if (this.yasminFacing < 0) c.scale(-1, 1);
    drawYasmin(c, this.yasminFacing < 0 ? -this.yasminX : this.yasminX, this.yasminY, 1.5, globalTime);

    // Draw gun
    c.fillStyle = '#666';
    const gunX = (this.yasminFacing < 0 ? -this.yasminX : this.yasminX) + this.yasminFacing * 12;
    const gunY = this.yasminY - 5;
    c.fillRect(gunX, gunY - 2, this.yasminFacing * 15, 4);
    c.fillStyle = '#444';
    c.fillRect(gunX + this.yasminFacing * 15, gunY - 3, this.yasminFacing * 3, 6);
    c.restore();

    // Draw Robot Bunny
    drawRobotBunny(c, VW - 80, VH - 60, 1.2, globalTime, 'happy');
    if (this.robotMsgTimer > 0) {
      drawSpeechBubble(c, VW - 80, VH - 120, this.robotMsg);
    }

    // UI
    c.save();
    c.textAlign = 'left';
    c.textBaseline = 'top';
    c.font = 'bold 20px monospace';
    c.fillStyle = '#fff';
    c.strokeStyle = '#000';
    c.lineWidth = 3;
    c.strokeText('Asteroids: ' + this.asteroids.length + '/' + this.totalAsteroids, 20, 20);
    c.fillText('Asteroids: ' + this.asteroids.length + '/' + this.totalAsteroids, 20, 20);
    c.strokeText('Time: ' + Math.ceil(this.gameTime) + 's', 20, 50);
    c.fillText('Time: ' + Math.ceil(this.gameTime) + 's', 20, 50);
    c.restore();
  }
};

// ============================================================
// LEVEL 5 VICTORY
// ============================================================
states.LEVEL5_VICTORY = {
  chestOpen: 0, confettiDone: false, asteroidsDestroyed: 0, allCleared: false,
  init() {
    particles = [];
    this.chestOpen = 0;
    this.confettiDone = false;
    // Get asteroids destroyed from previous state
    this.asteroidsDestroyed = states.LEVEL5_PLAYING.asteroidsDestroyed || 0;
    this.allCleared = states.LEVEL5_PLAYING.asteroids.length === 0;
    SFX.treasure();
  },
  update(dt) {
    this.chestOpen = Math.min(1, this.chestOpen + dt * 0.5);
    if (this.chestOpen > 0.6 && !this.confettiDone) {
      this.confettiDone = true;
      spawnConfetti(VW/2, VH/2-40, 100);
      SFX.victory();
    }
    updateParticles(dt);
    if (stateTime > 5 || (stateTime > 2 && anyKeyJustPressed())) {
      changeState('GAME_COMPLETE');
    }
  },
  draw(c) {
    // Deep space background
    const grd = c.createLinearGradient(0, 0, 0, VH);
    grd.addColorStop(0, '#0a0020'); grd.addColorStop(1, '#1a0040');
    c.fillStyle = grd; c.fillRect(0, 0, VW, VH);

    // Stars
    c.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i = 0; i < 100; i++) {
      const sx = (i * 137.5) % VW;
      const sy = (i * 97.3) % VH;
      c.fillRect(sx, sy, 1, 1);
    }

    // Treasure
    drawTreasureChest(c, VW/2, VH/2-20, this.chestOpen);

    c.save(); c.textAlign = 'center'; c.textBaseline = 'middle';
    c.font = 'bold 36px monospace'; c.fillStyle = '#ffd700';
    if (this.allCleared) {
      c.fillText('ALL ASTEROIDS CLEARED!', VW/2, 100);
    } else {
      c.fillText('SPACE SECURED!', VW/2, 100);
    }
    c.font = '24px monospace'; c.fillStyle = '#ff6347';
    c.fillText('You destroyed ' + this.asteroidsDestroyed + ' asteroids!', VW/2, 150);

    // Star count
    drawStar(c, VW/2-40, VH-100, 12, 5, '#ffd700');
    c.font = 'bold 20px monospace'; c.fillStyle = '#ffd700';
    c.fillText('×' + starCount, VW/2, VH-100);

    // Characters celebrating
    drawYasmin(c, VW/2-100, VH/2-10+Math.sin(globalTime*4)*10, 1.5, globalTime);
    drawRobotBunny(c, VW/2+100, VH/2-20, 1.5, globalTime, 'excited');
    drawSpeechBubble(c, VW/2+100, VH/2-80, "Space is safe!");

    c.restore();
    drawParticles(c);
  }
};

// ============================================================
// GAME COMPLETE
// ============================================================
states.GAME_COMPLETE = {
  confettiTimer: 0, hue: 0,
  init() {
    particles = [];
    this.confettiTimer = 0; this.hue = 0;
    SFX.victory();
  },
  update(dt) {
    this.hue = (this.hue + 60*dt) % 360;
    this.confettiTimer += dt;
    if (this.confettiTimer > 0.3) {
      this.confettiTimer = 0;
      spawnConfetti(Math.random()*VW, -20, 8);
    }
    updateParticles(dt);
    if (stateTime > 2 && consumeJustPressed('Space')) {
      starCount = 0; hearts = 3;
      changeState('TITLE');
    }
  },
  draw(c) {
    // Rainbow gradient
    const grd = c.createLinearGradient(0, 0, VW, VH);
    for (let i = 0; i <= 6; i++) {
      grd.addColorStop(i/6, `hsl(${(this.hue + i*60) % 360}, 70%, 30%)`);
    }
    c.fillStyle = grd; c.fillRect(0, 0, VW, VH);
    // Stars
    c.fillStyle = 'rgba(255,255,255,0.5)';
    for (let i = 0; i < 40; i++) {
      const sx = (i*137.5)%VW, sy = (i*97.3)%VH;
      const tw = 0.5+Math.sin(globalTime*2+i)*0.5;
      c.beginPath(); c.arc(sx, sy, 1.5*tw, 0, Math.PI*2); c.fill();
    }
    c.save(); c.textAlign = 'center'; c.textBaseline = 'middle';
    // Title with sparkle
    const bounce = Math.sin(globalTime*3)*8;
    c.font = 'bold 48px monospace';
    c.fillStyle = '#ffd700';
    c.fillText('CONGRATULATIONS', VW/2, 100+bounce);
    c.font = 'bold 56px monospace';
    // Rainbow text
    const txt = 'CHAMPION!';
    const tw = c.measureText(txt).width;
    for (let i = 0; i < txt.length; i++) {
      c.fillStyle = `hsl(${(this.hue + i*50) % 360}, 90%, 60%)`;
      const cx = VW/2 - tw/2;
      const charW = c.measureText(txt[i]).width;
      const xoff = c.measureText(txt.substring(0,i)).width;
      c.fillText(txt[i], cx + xoff + charW/2, 170+bounce*0.5+Math.sin(globalTime*4+i)*5);
    }
    // Achievement text
    c.font = '20px monospace'; c.fillStyle = '#20c997';
    c.fillText('5 Levels Completed!', VW/2, 230);
    // Star count
    c.font = 'bold 24px monospace'; c.fillStyle = '#ffd700';
    drawStar(c, VW/2-50, 270, 14, 5, '#ffd700');
    c.fillText('×' + starCount + ' stars collected!', VW/2+20, 270);
    // Characters celebrating
    const pjump = Math.abs(Math.sin(globalTime*3))*20;
    drawPriyaFull(c, VW/2-120, 360-pjump, 1.8, globalTime, 1);
    drawYasmin(c, VW/2+20, 360-Math.abs(Math.sin(globalTime*3.3))*18, 1.8, globalTime);
    // Robots celebrating
    c.save(); c.translate(VW/2+150, 360-Math.abs(Math.sin(globalTime*2.5))*15);
    c.rotate(Math.sin(globalTime*4)*0.3);
    drawRobot(c, 0, 0, 1.8, globalTime, 'excited');
    c.restore();
    drawRobotBunny(c, VW/2-250, 360, 1.5, globalTime, 'excited');
    // Credits
    c.font = '16px monospace'; c.fillStyle = 'rgba(255,255,255,0.8)';
    c.fillText('Made with love from Arya', VW/2, VH-80);
    // Replay prompt
    if (Math.sin(globalTime*3) > 0) {
      c.font = 'bold 18px monospace'; c.fillStyle = '#fff';
      c.fillText('Press SPACE to Play Again!', VW/2, VH-40);
    }
    c.restore();
    drawParticles(c);
  }
};

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;
function gameLoop(timestamp) {
  const rawDt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  const dt = Math.min(rawDt, 0.05); // Cap at 50ms
  globalTime += dt;
  stateTime += dt;
  updateShake(dt);
  bgmPlaying = (gameState === 'LEVEL1_PLAYING' || gameState === 'LEVEL2_PLAYING');
  updateBGM(dt);
  // Update
  if (states[gameState] && states[gameState].update) states[gameState].update(dt);
  // Draw
  ctx.save();
  ctx.scale(scale, scale);
  applyShake(ctx);
  if (states[gameState] && states[gameState].draw) states[gameState].draw(ctx);
  ctx.restore();
  requestAnimationFrame(gameLoop);
}

// Initialize and start
changeState('TITLE');
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(gameLoop); });
</script>
