<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Adventure Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas {
  display: block;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
// SPACE ADVENTURE GAME
// ============================================================

// --- CONSTANTS ---
const VW = 800, VH = 600;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- RESPONSIVE SCALING ---
let scale = 1, offsetX = 0, offsetY = 0;
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  scale = Math.min(w / VW, h / VH);
  canvas.width = VW * scale;
  canvas.height = VH * scale;
  offsetX = (w - canvas.width) / 2;
  offsetY = (h - canvas.height) / 2;
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
}
window.addEventListener('resize', resize);
resize();

// --- INPUT ---
const keys = {};
const keysJustPressed = {};
window.addEventListener('keydown', e => {
  if (!keys[e.code]) keysJustPressed[e.code] = true;
  keys[e.code] = true;
  initAudio();
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });
// Mouse input
let mouseX = 0, mouseY = 0, mouseClicked = false;
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) / scale;
  mouseY = (e.clientY - rect.top) / scale;
});
canvas.addEventListener('click', e => {
  mouseClicked = true;
  initAudio();
});
function consumeMouseClick() {
  if (mouseClicked) { mouseClicked = false; return true; }
  return false;
}
function consumeJustPressed(code) {
  if (keysJustPressed[code]) { keysJustPressed[code] = false; return true; }
  return false;
}
function anyKeyJustPressed() {
  for (const k in keysJustPressed) { if (keysJustPressed[k]) { keysJustPressed[k] = false; return true; } }
  return false;
}
function clearJustPressed() { for (const k in keysJustPressed) keysJustPressed[k] = false; }

// --- AUDIO ENGINE ---
let audioCtx = null, audioReady = false;
function initAudio() {
  if (audioReady) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioReady = true;
  } catch(e) {}
}
function playTone(freq, dur, type, vol, delay) {
  if (!audioReady) return;
  const t = audioCtx.currentTime + (delay || 0);
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol || 0.15, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur);
}
function playNoise(dur, vol, delay, freq) {
  if (!audioReady) return;
  const t = audioCtx.currentTime + (delay || 0);
  const bufSize = audioCtx.sampleRate * dur;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.1, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  if (freq) {
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = freq; filt.Q.value = 2;
    src.connect(filt); filt.connect(gain);
  } else { src.connect(gain); }
  gain.connect(audioCtx.destination);
  src.start(t); src.stop(t + dur);
}

const SFX = {
  starCollect() { playTone(880,0.1,'sine',0.12); playTone(1100,0.1,'sine',0.12,0.08); playTone(1320,0.15,'sine',0.12,0.16); },
  hit() { playTone(100,0.3,'sawtooth',0.15); playNoise(0.2,0.15); },
  dodge() { playNoise(0.15,0.08,0,2000); },
  robotBeep() { playTone(800,0.08,'square',0.06); playTone(1000,0.08,'square',0.06,0.08); },
  jump() { if (!audioReady) return; const t=audioCtx.currentTime; const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(600,t+0.15); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2); o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+0.2); },
  land() { playTone(150,0.1,'sine',0.08); playNoise(0.08,0.05); },
  wind() { playNoise(0.5,0.06,0,400); },
  rockFall() { playTone(80,0.4,'sawtooth',0.1); playNoise(0.3,0.08,0,200); },
  treasure() { [523,659,784,988,1175].forEach((f,i) => playTone(f,0.25,'sine',0.12,i*0.12)); },
  victory() { [523,659,784,1047,1319].forEach((f,i) => playTone(f,0.3,'triangle',0.12,i*0.15)); },
  buttonSelect() { playTone(600,0.06,'square',0.08); },
  powerUp() { for(let i=0;i<6;i++) playTone(400+i*150,0.12,'sine',0.08,i*0.06); },
  heartLost() { playTone(400,0.2,'sine',0.12); playTone(300,0.3,'sine',0.12,0.15); },
};

// --- BACKGROUND MUSIC ---
let bgmTimer = 0, bgmPlaying = false;
function playBGMNote() {
  if (!audioReady) return;
  // Simple gentle melody that loops
  const notes = [262, 330, 392, 330, 294, 349, 392, 349, 262, 330, 392, 523, 494, 440, 392, 330];
  const idx = Math.floor(bgmTimer) % notes.length;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(notes[idx], t);
  gain.gain.setValueAtTime(0.03, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.5);
}
let bgmNextNote = 0;
function updateBGM(dt) {
  if (!audioReady || !bgmPlaying) return;
  bgmTimer += dt;
  if (bgmTimer >= bgmNextNote) {
    playBGMNote();
    bgmNextNote = bgmTimer + 0.5;
  }
}

// --- PARTICLE SYSTEM ---
let particles = [];
function spawnParticles(x, y, count, colors, speed, life, size) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (speed || 100) * (0.3 + Math.random() * 0.7);
    particles.push({
      x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
      life: (life||1) * (0.5+Math.random()*0.5), maxLife: life||1,
      color: colors[Math.floor(Math.random()*colors.length)],
      size: (size||3) * (0.5+Math.random()*0.5),
    });
  }
}
function spawnConfetti(x, y, count) {
  const colors = ['#ff0','#f0f','#0ff','#f00','#0f0','#fa0','#f6f','#6ff'];
  for (let i = 0; i < count; i++) {
    const angle = -Math.PI/2 + (Math.random()-0.5)*Math.PI*0.8;
    const spd = 150 + Math.random()*200;
    particles.push({
      x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd - 100,
      life: 2+Math.random()*2, maxLife: 3,
      color: colors[Math.floor(Math.random()*colors.length)],
      size: 3+Math.random()*4, confetti: true,
      rot: Math.random()*Math.PI*2, rotSpd: (Math.random()-0.5)*10,
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.confetti) p.vy += 200*dt;
    p.life -= dt;
    if (p.confetti) p.rot += p.rotSpd * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles(c) {
  particles.forEach(p => {
    const alpha = Math.max(0, p.life / p.maxLife);
    c.globalAlpha = alpha;
    if (p.confetti) {
      c.save(); c.translate(p.x, p.y); c.rotate(p.rot);
      c.fillStyle = p.color;
      c.fillRect(-p.size, -p.size*0.4, p.size*2, p.size*0.8);
      c.restore();
    } else {
      c.fillStyle = p.color;
      c.beginPath(); c.arc(p.x, p.y, p.size*alpha, 0, Math.PI*2); c.fill();
    }
  });
  c.globalAlpha = 1;
}

// --- SCREEN SHAKE ---
let shakeAmount = 0, shakeTimer = 0;
function triggerShake(amount, dur) { shakeAmount = amount; shakeTimer = dur; }
function updateShake(dt) { if (shakeTimer > 0) shakeTimer -= dt; else shakeAmount = 0; }
function applyShake(c) {
  if (shakeAmount > 0 && shakeTimer > 0) {
    c.translate((Math.random()-0.5)*shakeAmount*2, (Math.random()-0.5)*shakeAmount*2);
  }
}

// --- UTILITY ---
function lerp(a,b,t) { return a+(b-a)*t; }
function clamp(v,lo,hi) { return Math.max(lo,Math.min(hi,v)); }
function dist(x1,y1,x2,y2) { return Math.sqrt((x2-x1)**2+(y2-y1)**2); }
function easeInOut(t) { return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }

// --- STARFIELD ---
function createStarfield(count, layers) {
  const stars = [];
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random()*VW, y: Math.random()*VH,
      size: 0.5+Math.random()*1.5,
      layer: Math.floor(Math.random()*layers),
      twinkle: Math.random()*Math.PI*2,
    });
  }
  return stars;
}
function drawStarfield(c, stars, time, speeds, scrollX, scrollY) {
  stars.forEach(s => {
    const spd = speeds[s.layer] || 1;
    let sx = (s.x - (scrollX||0)*spd) % VW; if (sx<0) sx+=VW;
    let sy = (s.y - (scrollY||0)*spd) % VH; if (sy<0) sy+=VH;
    const tw = 0.5 + 0.5*Math.sin(time*2 + s.twinkle);
    c.fillStyle = `rgba(255,255,255,${0.3+tw*0.7})`;
    c.beginPath(); c.arc(sx, sy, s.size*tw, 0, Math.PI*2); c.fill();
  });
}

// --- DRAW HEART ---
function drawHeart(c, x, y, size, filled) {
  c.save(); c.translate(x, y);
  c.beginPath();
  c.moveTo(0, size*0.3);
  c.bezierCurveTo(-size*0.5, -size*0.3, -size, size*0.1, 0, size);
  c.bezierCurveTo(size, size*0.1, size*0.5, -size*0.3, 0, size*0.3);
  c.closePath();
  if (filled) { c.fillStyle = '#f44'; c.fill(); }
  c.strokeStyle = '#f44'; c.lineWidth = 1.5; c.stroke();
  c.restore();
}

// --- DRAW STAR ---
function drawStar(c, x, y, r, points, color) {
  c.save(); c.translate(x, y); c.beginPath();
  for (let i = 0; i < points*2; i++) {
    const a = (i * Math.PI / points) - Math.PI/2;
    const rad = i%2===0 ? r : r*0.4;
    if (i===0) c.moveTo(Math.cos(a)*rad, Math.sin(a)*rad);
    else c.lineTo(Math.cos(a)*rad, Math.sin(a)*rad);
  }
  c.closePath(); c.fillStyle = color||'#ffd700'; c.fill();
  c.strokeStyle = '#cc8800'; c.lineWidth = 1; c.stroke();
  c.restore();
}

// --- DRAW PRIYA ---
function drawPriyaSeated(c, x, y, sc) {
  // Seated version for cockpit
  c.save(); c.translate(x, y); c.scale(sc||1, sc||1);
  // Body (purple suit)
  c.fillStyle = '#8833cc';
  c.fillRect(-6, 0, 12, 12);
  // Head
  c.fillStyle = '#c68642';
  c.beginPath(); c.arc(0, -4, 7, 0, Math.PI*2); c.fill();
  // Hair
  c.fillStyle = '#1a1a2e';
  c.beginPath(); c.arc(0, -6, 7, Math.PI, Math.PI*2); c.fill();
  c.fillRect(-7, -6, 3, 6);
  c.fillRect(4, -6, 3, 6);
  // Eyes
  c.fillStyle = '#222';
  c.beginPath(); c.arc(-3, -3, 1.2, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(3, -3, 1.2, 0, Math.PI*2); c.fill();
  // Eye shine
  c.fillStyle = '#fff';
  c.beginPath(); c.arc(-2.5, -3.5, 0.5, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(3.5, -3.5, 0.5, 0, Math.PI*2); c.fill();
  // Cheeks
  c.fillStyle = 'rgba(255,150,150,0.4)';
  c.beginPath(); c.arc(-5, -1, 2, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(5, -1, 2, 0, Math.PI*2); c.fill();
  // Smile
  c.strokeStyle = '#222'; c.lineWidth = 0.8;
  c.beginPath(); c.arc(0, -1, 3, 0.2, Math.PI-0.2); c.stroke();
  // White trim
  c.fillStyle = '#fff';
  c.fillRect(-6, 0, 12, 2);
  c.restore();
}

function drawPriyaFull(c, x, y, sc, frame, facing) {
  c.save(); c.translate(x, y); c.scale(sc||1, sc||1);
  if (facing < 0) { c.scale(-1, 1); }
  const bob = Math.sin(frame*8)*1.5;
  const legAnim = Math.sin(frame*10)*3;
  // Legs
  c.fillStyle = '#6622aa';
  c.fillRect(-4, 14, 3, 10+legAnim*0.5);
  c.fillRect(1, 14, 3, 10-legAnim*0.5);
  // Boots
  c.fillStyle = '#fff';
  c.fillRect(-5, 23+legAnim*0.5, 5, 3);
  c.fillRect(0, 23-legAnim*0.5, 5, 3);
  // Body
  c.fillStyle = '#8833cc';
  c.fillRect(-6, 2+bob*0.3, 12, 13);
  // White trim
  c.fillStyle = '#fff';
  c.fillRect(-6, 2+bob*0.3, 12, 2);
  c.fillRect(-6, 13+bob*0.3, 12, 2);
  // Arms
  c.fillStyle = '#8833cc';
  c.save(); c.translate(-6, 5+bob*0.3); c.rotate(Math.sin(frame*8)*0.3);
  c.fillRect(-2, 0, 3, 10); c.restore();
  c.save(); c.translate(6, 5+bob*0.3); c.rotate(-Math.sin(frame*8)*0.3);
  c.fillRect(-1, 0, 3, 10); c.restore();
  // Head
  c.fillStyle = '#c68642';
  c.beginPath(); c.arc(0, -4+bob*0.5, 8, 0, Math.PI*2); c.fill();
  // Hair
  c.fillStyle = '#1a1a2e';
  c.beginPath(); c.arc(0, -7+bob*0.5, 8, Math.PI, Math.PI*2); c.fill();
  c.fillRect(-8, -7+bob*0.5, 3, 8);
  c.fillRect(5, -7+bob*0.5, 3, 8);
  // Ponytail
  c.beginPath(); c.ellipse(7, -5+bob*0.5, 3, 5, 0.3, 0, Math.PI*2); c.fill();
  // Eyes
  c.fillStyle = '#222';
  c.beginPath(); c.arc(-3, -3+bob*0.5, 1.5, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(3, -3+bob*0.5, 1.5, 0, Math.PI*2); c.fill();
  c.fillStyle = '#fff';
  c.beginPath(); c.arc(-2.3, -3.8+bob*0.5, 0.6, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(3.7, -3.8+bob*0.5, 0.6, 0, Math.PI*2); c.fill();
  // Cheeks
  c.fillStyle = 'rgba(255,150,150,0.4)';
  c.beginPath(); c.arc(-6, 0+bob*0.5, 2.5, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(6, 0+bob*0.5, 2.5, 0, Math.PI*2); c.fill();
  // Smile
  c.strokeStyle = '#222'; c.lineWidth = 1;
  c.beginPath(); c.arc(0, 0+bob*0.5, 3.5, 0.2, Math.PI-0.2); c.stroke();
  c.restore();
}

// --- DRAW YASMIN ---
function drawYasmin(c, x, y, sc, time) {
  c.save(); c.translate(x, y); c.scale(sc||1, sc||1);
  const bob = Math.sin(time*2)*2;
  const hairWave = Math.sin(time*3)*1.5;
  // Legs
  c.fillStyle = '#17a085';
  c.fillRect(-4, 14, 3, 10);
  c.fillRect(1, 14, 3, 10);
  // Boots
  c.fillStyle = '#fff';
  c.fillRect(-5, 23, 5, 3);
  c.fillRect(0, 23, 5, 3);
  // Body (teal suit)
  c.fillStyle = '#20c997';
  c.fillRect(-6, 2+bob*0.3, 12, 13);
  // White trim
  c.fillStyle = '#fff';
  c.fillRect(-6, 2+bob*0.3, 12, 2);
  c.fillRect(-6, 13+bob*0.3, 12, 2);
  // Arms
  c.fillStyle = '#20c997';
  c.fillRect(-8, 5+bob*0.3, 3, 10);
  c.fillRect(5, 5+bob*0.3, 3, 10);
  // Head
  c.fillStyle = '#c68642';
  c.beginPath(); c.arc(0, -4+bob*0.5, 8, 0, Math.PI*2); c.fill();
  // Long flowing hair
  c.fillStyle = '#2d1b0e';
  // Hair top
  c.beginPath(); c.arc(0, -7+bob*0.5, 8, Math.PI, Math.PI*2); c.fill();
  // Left long hair
  c.beginPath();
  c.moveTo(-8, -6+bob*0.5);
  c.quadraticCurveTo(-10+hairWave*0.3, 2+bob*0.5, -9+hairWave*0.5, 12+bob*0.5);
  c.lineTo(-6+hairWave*0.5, 12+bob*0.5);
  c.quadraticCurveTo(-7+hairWave*0.3, 2+bob*0.5, -6, -5+bob*0.5);
  c.fill();
  // Right long hair
  c.beginPath();
  c.moveTo(8, -6+bob*0.5);
  c.quadraticCurveTo(10-hairWave*0.3, 2+bob*0.5, 9-hairWave*0.5, 12+bob*0.5);
  c.lineTo(6-hairWave*0.5, 12+bob*0.5);
  c.quadraticCurveTo(7-hairWave*0.3, 2+bob*0.5, 6, -5+bob*0.5);
  c.fill();
  // Eyes
  c.fillStyle = '#222';
  c.beginPath(); c.arc(-3, -3+bob*0.5, 1.5, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(3, -3+bob*0.5, 1.5, 0, Math.PI*2); c.fill();
  c.fillStyle = '#fff';
  c.beginPath(); c.arc(-2.3, -3.8+bob*0.5, 0.6, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(3.7, -3.8+bob*0.5, 0.6, 0, Math.PI*2); c.fill();
  // Cheeks
  c.fillStyle = 'rgba(255,150,150,0.4)';
  c.beginPath(); c.arc(-6, 0+bob*0.5, 2.5, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(6, 0+bob*0.5, 2.5, 0, Math.PI*2); c.fill();
  // Smile
  c.strokeStyle = '#222'; c.lineWidth = 1;
  c.beginPath(); c.arc(0, 0+bob*0.5, 3.5, 0.2, Math.PI-0.2); c.stroke();
  c.restore();
}

// --- DRAW ROBOT ---
function drawRobot(c, x, y, sc, time, mood) {
  c.save(); c.translate(x, y); c.scale(sc||1, sc||1);
  const bob = Math.sin(time*3)*2;
  // Antenna
  c.strokeStyle = '#aaa'; c.lineWidth = 1.5;
  c.beginPath(); c.moveTo(0, -16+bob); c.lineTo(0, -22+Math.sin(time*5)*2+bob); c.stroke();
  c.fillStyle = '#f44';
  c.beginPath(); c.arc(0, -23+Math.sin(time*5)*2+bob, 2.5, 0, Math.PI*2); c.fill();
  // Body
  const r = 5;
  c.fillStyle = '#c0c0c0';
  c.beginPath();
  c.moveTo(-8+r, -14+bob); c.arcTo(8, -14+bob, 8, 10+bob, r);
  c.arcTo(8, 10+bob, -8, 10+bob, r); c.arcTo(-8, 10+bob, -8, -14+bob, r);
  c.arcTo(-8, -14+bob, 8, -14+bob, r); c.closePath(); c.fill();
  c.strokeStyle = '#888'; c.lineWidth = 1; c.stroke();
  // Visor
  c.fillStyle = '#1a1a3e';
  c.beginPath();
  c.moveTo(-6, -12+bob); c.lineTo(6, -12+bob);
  c.lineTo(6, -4+bob); c.lineTo(-6, -4+bob); c.closePath(); c.fill();
  // Eyes (mood dependent)
  const blinkCycle = Math.sin(time*0.7);
  const blink = blinkCycle > 0.95;
  c.fillStyle = '#0ff';
  if (blink) {
    c.fillRect(-4, -8.5+bob, 3, 1);
    c.fillRect(1, -8.5+bob, 3, 1);
  } else if (mood === 'happy' || mood === 'excited') {
    // Curved happy eyes
    c.beginPath(); c.arc(-2.5, -7+bob, 2, Math.PI, 0); c.fill();
    c.beginPath(); c.arc(2.5, -7+bob, 2, Math.PI, 0); c.fill();
  } else if (mood === 'worried') {
    c.beginPath(); c.arc(-2.5, -8+bob, 1.5, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(2.5, -8+bob, 1.5, 0, Math.PI*2); c.fill();
    // Worried brows
    c.strokeStyle = '#0ff'; c.lineWidth = 0.8;
    c.beginPath(); c.moveTo(-4, -11+bob); c.lineTo(-1, -10+bob); c.stroke();
    c.beginPath(); c.moveTo(4, -11+bob); c.lineTo(1, -10+bob); c.stroke();
  } else {
    // Default / alert
    c.beginPath(); c.arc(-2.5, -8+bob, 1.8, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(2.5, -8+bob, 1.8, 0, Math.PI*2); c.fill();
  }
  // Heart on chest
  c.fillStyle = '#f9a';
  c.beginPath();
  c.moveTo(0, 4+bob);
  c.bezierCurveTo(-2, 1+bob, -4, 3+bob, 0, 7+bob);
  c.bezierCurveTo(4, 3+bob, 2, 1+bob, 0, 4+bob);
  c.fill();
  // Little arms
  c.fillStyle = '#aaa';
  c.fillRect(-11, -6+bob, 4, 3);
  c.fillRect(7, -6+bob, 4, 3);
  c.restore();
}

// --- DRAW ROBOT BUNNY ---
function drawRobotBunny(c, x, y, sc, time, mood) {
  c.save(); c.translate(x, y); c.scale(sc||1, sc||1);
  const hop = Math.abs(Math.sin(time*2))*4;
  const earWiggle = Math.sin(time*6)*0.1;
  // Bunny ears
  c.fillStyle = '#c0c0c0';
  c.strokeStyle = '#888'; c.lineWidth = 1;
  // Left ear
  c.beginPath();
  c.ellipse(-3, -22-hop+earWiggle*3, 2.5, 10, -0.2, 0, Math.PI*2);
  c.fill(); c.stroke();
  // Inner left ear (pink)
  c.fillStyle = '#ffb6c1';
  c.beginPath();
  c.ellipse(-3, -22-hop+earWiggle*3, 1.2, 6, -0.2, 0, Math.PI*2);
  c.fill();
  // Right ear
  c.fillStyle = '#c0c0c0';
  c.beginPath();
  c.ellipse(3, -22-hop-earWiggle*3, 2.5, 10, 0.2, 0, Math.PI*2);
  c.fill(); c.stroke();
  // Inner right ear (pink)
  c.fillStyle = '#ffb6c1';
  c.beginPath();
  c.ellipse(3, -22-hop-earWiggle*3, 1.2, 6, 0.2, 0, Math.PI*2);
  c.fill();
  // Body
  const r = 5;
  c.fillStyle = '#c0c0c0';
  c.beginPath();
  c.moveTo(-8+r, -14-hop); c.arcTo(8, -14-hop, 8, 10-hop, r);
  c.arcTo(8, 10-hop, -8, 10-hop, r); c.arcTo(-8, 10-hop, -8, -14-hop, r);
  c.arcTo(-8, -14-hop, 8, -14-hop, r); c.closePath(); c.fill();
  c.strokeStyle = '#888'; c.lineWidth = 1; c.stroke();
  // Visor
  c.fillStyle = '#1a1a3e';
  c.beginPath();
  c.moveTo(-6, -12-hop); c.lineTo(6, -12-hop);
  c.lineTo(6, -4-hop); c.lineTo(-6, -4-hop); c.closePath(); c.fill();
  // Eyes (mood dependent)
  const blinkCycle = Math.sin(time*0.7);
  const blink = blinkCycle > 0.95;
  c.fillStyle = '#0ff';
  if (blink) {
    c.fillRect(-4, -8.5-hop, 3, 1);
    c.fillRect(1, -8.5-hop, 3, 1);
  } else if (mood === 'happy' || mood === 'excited') {
    // Curved happy eyes
    c.beginPath(); c.arc(-2.5, -7-hop, 2, Math.PI, 0); c.fill();
    c.beginPath(); c.arc(2.5, -7-hop, 2, Math.PI, 0); c.fill();
  } else if (mood === 'worried') {
    c.beginPath(); c.arc(-2.5, -8-hop, 1.5, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(2.5, -8-hop, 1.5, 0, Math.PI*2); c.fill();
  } else {
    // Default
    c.beginPath(); c.arc(-2.5, -8-hop, 1.8, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(2.5, -8-hop, 1.8, 0, Math.PI*2); c.fill();
  }
  // Heart on chest
  c.fillStyle = '#f9a';
  c.beginPath();
  c.moveTo(0, 4-hop);
  c.bezierCurveTo(-2, 1-hop, -4, 3-hop, 0, 7-hop);
  c.bezierCurveTo(4, 3-hop, 2, 1-hop, 0, 4-hop);
  c.fill();
  // Little arms
  c.fillStyle = '#aaa';
  c.fillRect(-11, -6-hop, 4, 3);
  c.fillRect(7, -6-hop, 4, 3);
  // Bunny tail (fluffy white circle)
  c.fillStyle = '#fff';
  c.strokeStyle = '#ddd';
  c.lineWidth = 1;
  c.beginPath(); c.arc(0, 10-hop, 3, 0, Math.PI*2); c.fill(); c.stroke();
  c.restore();
}

function drawRobotJetFlames(c, x, y, sc, time) {
  c.save(); c.translate(x, y); c.scale(sc||1, sc||1);
  const bob = Math.sin(time*3)*2;
  const fl = 4+Math.sin(time*20)*2;
  c.fillStyle = '#f80';
  c.beginPath(); c.moveTo(-3, 10+bob); c.lineTo(0, 10+bob+fl+4); c.lineTo(3, 10+bob); c.fill();
  c.fillStyle = '#ff0';
  c.beginPath(); c.moveTo(-2, 10+bob); c.lineTo(0, 10+bob+fl); c.lineTo(2, 10+bob); c.fill();
  c.fillStyle = '#fff';
  c.beginPath(); c.moveTo(-1, 10+bob); c.lineTo(0, 10+bob+fl-2); c.lineTo(1, 10+bob); c.fill();
  c.restore();
}

// --- ROBOT SPEECH BUBBLE ---
function drawSpeechBubble(c, x, y, text) {
  if (!text) return;
  c.save();
  c.font = 'bold 11px monospace';
  const w = c.measureText(text).width + 16;
  const h = 20;
  const bx = x - w/2, by = y - h - 8;
  // Bubble
  c.fillStyle = 'rgba(255,255,255,0.92)';
  c.beginPath();
  c.moveTo(bx+6, by);
  c.lineTo(bx+w-6, by);
  c.arcTo(bx+w, by, bx+w, by+6, 6);
  c.lineTo(bx+w, by+h-6);
  c.arcTo(bx+w, by+h, bx+w-6, by+h, 6);
  // Tail
  c.lineTo(x+5, by+h);
  c.lineTo(x, by+h+6);
  c.lineTo(x-3, by+h);
  c.lineTo(bx+6, by+h);
  c.arcTo(bx, by+h, bx, by+h-6, 6);
  c.lineTo(bx, by+6);
  c.arcTo(bx, by, bx+6, by, 6);
  c.closePath();
  c.fill();
  c.strokeStyle = '#aaa'; c.lineWidth = 1; c.stroke();
  // Text
  c.fillStyle = '#333';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(text, x, by+h/2);
  c.restore();
}

// --- DRAW SPACESHIP ---
function drawSpaceship(c, x, y, time) {
  c.save(); c.translate(x, y);
  const hover = Math.sin(time*2)*3;
  c.translate(0, hover);
  // Engine flame
  const fl = 15+Math.sin(time*25)*5;
  c.fillStyle = '#f80';
  c.beginPath(); c.moveTo(-45, -5); c.lineTo(-45-fl-10, 0); c.lineTo(-45, 5); c.fill();
  c.fillStyle = '#ff0';
  c.beginPath(); c.moveTo(-45, -3); c.lineTo(-45-fl, 0); c.lineTo(-45, 3); c.fill();
  c.fillStyle = '#fff';
  c.beginPath(); c.moveTo(-45, -1.5); c.lineTo(-45-fl+5, 0); c.lineTo(-45, 1.5); c.fill();
  // Ship body
  c.fillStyle = '#d0d0e0';
  c.beginPath();
  c.moveTo(40, 0);
  c.quadraticCurveTo(35, -18, 10, -20);
  c.lineTo(-35, -14);
  c.quadraticCurveTo(-48, -8, -48, 0);
  c.quadraticCurveTo(-48, 8, -35, 14);
  c.lineTo(10, 20);
  c.quadraticCurveTo(35, 18, 40, 0);
  c.closePath();
  c.fill();
  c.strokeStyle = '#8833cc'; c.lineWidth = 2; c.stroke();
  // Purple accent stripe
  c.fillStyle = '#8833cc';
  c.fillRect(-30, -2, 60, 4);
  // Cockpit (transparent dome)
  c.fillStyle = 'rgba(150, 200, 255, 0.35)';
  c.beginPath();
  c.ellipse(5, -5, 18, 14, 0, Math.PI, 0);
  c.fill();
  c.strokeStyle = 'rgba(150,200,255,0.6)'; c.lineWidth = 1.5; c.stroke();
  // Priya inside cockpit
  drawPriyaSeated(c, 0, -2, 0.6);
  // Robot inside cockpit (smaller)
  drawRobot(c, 12, 1, 0.4, time, 'happy');
  // Wing detail
  c.fillStyle = '#b0b0c0';
  c.beginPath(); c.moveTo(-10, 14); c.lineTo(-25, 25); c.lineTo(5, 18); c.closePath(); c.fill();
  c.beginPath(); c.moveTo(-10, -14); c.lineTo(-25, -25); c.lineTo(5, -18); c.closePath(); c.fill();
  c.restore();
}

// --- DRAW ASTEROID ---
function drawAsteroid(c, x, y, r, variant, rot) {
  c.save(); c.translate(x, y); c.rotate(rot||0);
  c.fillStyle = '#8a7060';
  if (variant === 0) {
    // Jagged
    c.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = (i/8)*Math.PI*2;
      const rr = r * (0.7 + ((i*37)%10)/15);
      if (i===0) c.moveTo(Math.cos(a)*rr, Math.sin(a)*rr);
      else c.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
    }
    c.closePath(); c.fill();
    c.strokeStyle = '#6a5040'; c.lineWidth = 1.5; c.stroke();
  } else if (variant === 1) {
    // Smooth round
    c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fill();
    c.strokeStyle = '#6a5040'; c.lineWidth = 1.5; c.stroke();
    // Craters
    c.fillStyle = '#7a6050';
    c.beginPath(); c.arc(-r*0.3, -r*0.2, r*0.25, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(r*0.2, r*0.3, r*0.15, 0, Math.PI*2); c.fill();
  } else {
    // Cluster
    c.beginPath(); c.arc(-r*0.3, 0, r*0.6, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(r*0.3, -r*0.2, r*0.55, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(0, r*0.3, r*0.45, 0, Math.PI*2); c.fill();
    c.strokeStyle = '#6a5040'; c.lineWidth = 1;
    c.beginPath(); c.arc(-r*0.3, 0, r*0.6, 0, Math.PI*2); c.stroke();
    c.beginPath(); c.arc(r*0.3, -r*0.2, r*0.55, 0, Math.PI*2); c.stroke();
  }
  c.restore();
}

// --- DRAW TREASURE CHEST ---
function drawTreasureChest(c, x, y, openPct) {
  c.save(); c.translate(x, y);
  const lidAngle = -openPct * 1.2;
  // Base
  c.fillStyle = '#8B4513';
  c.fillRect(-20, 0, 40, 20);
  c.strokeStyle = '#5a2d0c'; c.lineWidth = 2;
  c.strokeRect(-20, 0, 40, 20);
  // Gold trim
  c.fillStyle = '#ffd700';
  c.fillRect(-20, 0, 40, 3);
  c.fillRect(-20, 17, 40, 3);
  c.fillRect(-2, 5, 4, 10);
  // Lid
  c.save(); c.translate(-20, 0); c.rotate(lidAngle);
  c.fillStyle = '#a0522d';
  c.beginPath();
  c.moveTo(0, 0); c.lineTo(40, 0);
  c.lineTo(40, -10); c.quadraticCurveTo(20, -18, 0, -10);
  c.closePath(); c.fill();
  c.strokeStyle = '#5a2d0c'; c.lineWidth = 2; c.stroke();
  c.fillStyle = '#ffd700';
  c.fillRect(0, -2, 40, 3);
  c.restore();
  // Glow when opening
  if (openPct > 0.3) {
    c.globalAlpha = (openPct-0.3)*1.4;
    c.fillStyle = '#ffd700';
    c.beginPath(); c.ellipse(0, -5, 15*openPct, 20*openPct, 0, 0, Math.PI*2); c.fill();
    c.globalAlpha = 1;
  }
  c.restore();
}

// --- STATE MACHINE ---
let gameState = 'TITLE';
let stateTime = 0;
let globalTime = 0;
let hearts = 3;
let starCount = 0;

const states = {};

function changeState(newState) {
  if (states[gameState] && states[gameState].cleanup) states[gameState].cleanup();
  gameState = newState;
  stateTime = 0;
  clearJustPressed();
  if (states[gameState] && states[gameState].init) states[gameState].init();
}

states.TITLE = {
  stars: null, shootingStars: [], shipX: 0, shipPhase: 0,
  buttons: [],
  hoveredButton: null,
  init() {
    this.stars = createStarfield(200, 3);
    this.shootingStars = [];
    this.shipX = -100;
    this.shipPhase = 0;
    // Define level selection buttons (2x2 + 1 centered)
    this.buttons = [
      { x: VW/2 - 165, y: VH - 220, w: 150, h: 50, label: 'Level 1', sublabel: 'Asteroid Dodge', state: 'LEVEL1_INTRO' },
      { x: VW/2 + 15, y: VH - 220, w: 150, h: 50, label: 'Level 2', sublabel: 'Mountain Climb', state: 'LEVEL2_INTRO' },
      { x: VW/2 - 165, y: VH - 155, w: 150, h: 50, label: 'Level 3', sublabel: 'Planet Order', state: 'LEVEL3_INTRO' },
      { x: VW/2 + 15, y: VH - 155, w: 150, h: 50, label: 'Level 4', sublabel: 'Catch Butterflies', state: 'LEVEL4_INTRO' },
      { x: VW/2 - 75, y: VH - 90, w: 150, h: 50, label: 'Level 5', sublabel: 'Tap Asteroids', state: 'LEVEL5_INTRO' }
    ];
    this.hoveredButton = null;
  },
  update(dt) {
    this.shipPhase += dt;
    this.shipX += 60 * dt;
    if (this.shipX > VW + 100) this.shipX = -100;
    // Shooting stars
    if (Math.random() < dt * 0.5) {
      this.shootingStars.push({
        x: Math.random()*VW, y: Math.random()*VH*0.5,
        vx: 300+Math.random()*200, vy: 100+Math.random()*100,
        life: 0.5+Math.random()*0.5
      });
    }
    for (let i = this.shootingStars.length-1; i >= 0; i--) {
      const s = this.shootingStars[i];
      s.x += s.vx*dt; s.y += s.vy*dt; s.life -= dt;
      if (s.life <= 0) this.shootingStars.splice(i, 1);
    }
    // Check button hover
    this.hoveredButton = null;
    for (const btn of this.buttons) {
      if (mouseX >= btn.x && mouseX <= btn.x + btn.w &&
          mouseY >= btn.y && mouseY <= btn.y + btn.h) {
        this.hoveredButton = btn;
        break;
      }
    }
    // Handle button clicks
    if (stateTime > 0.5 && consumeMouseClick() && this.hoveredButton) {
      SFX.buttonSelect();
      changeState(this.hoveredButton.state);
    }
    // Handle keyboard start (goes to Level 1)
    if (stateTime > 0.5 && anyKeyJustPressed()) {
      SFX.buttonSelect();
      changeState('LEVEL1_INTRO');
    }
  },
  draw(c) {
    // Deep space background
    const grd = c.createLinearGradient(0, 0, 0, VH);
    grd.addColorStop(0, '#0a0020'); grd.addColorStop(1, '#1a0040');
    c.fillStyle = grd; c.fillRect(0, 0, VW, VH);
    drawStarfield(c, this.stars, globalTime, [0.2, 0.5, 1]);
    // Shooting stars
    this.shootingStars.forEach(s => {
      const alpha = s.life;
      c.strokeStyle = `rgba(255,255,255,${alpha})`;
      c.lineWidth = 2;
      c.beginPath(); c.moveTo(s.x, s.y); c.lineTo(s.x-s.vx*0.05, s.y-s.vy*0.05); c.stroke();
    });
    // Ship flying across
    drawSpaceship(c, this.shipX, VH*0.6 + Math.sin(this.shipPhase*1.5)*20, globalTime);
    // Title
    const bounce = Math.sin(globalTime*2)*5;
    c.save();
    c.font = 'bold 64px monospace';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    // Gold shadow
    c.fillStyle = '#aa8800';
    c.fillText("SPACE ADVENTURE", VW/2+2, 140+bounce+2);
    c.fillStyle = '#ffd700';
    c.fillText("SPACE ADVENTURE", VW/2, 140+bounce);
    // Subtitle
    c.font = 'bold 22px monospace';
    c.fillStyle = '#c8a0ff';
    c.fillText('A Space Adventure', VW/2, 200+bounce*0.5);
    // Level selection buttons
    for (const btn of this.buttons) {
      const isHovered = this.hoveredButton === btn;
      // Button background
      c.fillStyle = isHovered ? 'rgba(255,215,0,0.3)' : 'rgba(100,50,150,0.5)';
      c.strokeStyle = isHovered ? '#ffd700' : '#c8a0ff';
      c.lineWidth = 3;
      c.beginPath();
      c.roundRect(btn.x, btn.y, btn.w, btn.h, 10);
      c.fill();
      c.stroke();
      // Button text
      c.fillStyle = isHovered ? '#ffd700' : '#ffffff';
      c.font = 'bold 18px monospace';
      c.fillText(btn.label, btn.x + btn.w/2, btn.y + 18);
      c.font = '12px monospace';
      c.fillStyle = isHovered ? '#ffea99' : '#c8a0ff';
      c.fillText(btn.sublabel, btn.x + btn.w/2, btn.y + 35);
    }
    // Blink prompt
    if (Math.sin(globalTime*3) > 0) {
      c.font = '16px monospace';
      c.fillStyle = '#fff';
      c.fillText('Press any key or select a level', VW/2, VH-30);
    }
    // Credits removed
    c.restore();
  }
};

// ============================================================
// LEVEL 1: SPACE SHIP ASTEROID DODGE
// ============================================================
states.LEVEL1_PLAYING = {
  stars: null, shipX: 0, shipY: 0, shipVX: 0, shipVY: 0,
  asteroids: [], collectibles: [],
  progress: 0, invulnTimer: 0, spawnTimer: 0,
  robotMsg: '', robotMsgTimer: 0, robotSilence: 0,
  dodgeCheckTimer: 0, nearMissMsg: false,
  planetPhase: 0, docking: false, dockTimer: 0,
  init() {
    this.stars = createStarfield(200, 3);
    this.shipX = 150; this.shipY = VH/2;
    this.shipVX = 0; this.shipVY = 0;
    this.asteroids = []; this.collectibles = [];
    this.progress = 0; this.invulnTimer = 0; this.spawnTimer = 0;
    hearts = 3; this.robotMsg = ''; this.robotMsgTimer = 0; this.robotSilence = 0;
    this.docking = false; this.dockTimer = 0;
    this.planetPhase = 0;
    particles = [];
    this.setRobotMsg("Here we go!");
  },
  setRobotMsg(msg) {
    this.robotMsg = msg; this.robotMsgTimer = 2.5; this.robotSilence = 0;
    SFX.robotBeep();
  },
  update(dt) {
    if (this.docking) {
      this.dockTimer += dt;
      this.shipX += 80 * dt;
      this.shipY = lerp(this.shipY, VH/2, dt*2);
      if (this.dockTimer > 2.5) {
        changeState('LEVEL1_VICTORY');
      }
      updateParticles(dt);
      return;
    }
    // Ship controls
    const accel = 500, damp = 0.92;
    if (keys['ArrowUp'] || keys['KeyW']) this.shipVY -= accel * dt;
    if (keys['ArrowDown'] || keys['KeyS']) this.shipVY += accel * dt;
    if (keys['ArrowLeft'] || keys['KeyA']) this.shipVX -= accel * dt;
    if (keys['ArrowRight'] || keys['KeyD']) this.shipVX += accel * dt;
    this.shipVX *= damp; this.shipVY *= damp;
    this.shipX += this.shipVX * dt; this.shipY += this.shipVY * dt;
    this.shipX = clamp(this.shipX, 50, VW-50);
    this.shipY = clamp(this.shipY, 40, VH-40);
    // Progress
    const elapsed = stateTime;
    const progressRate = 1/60; // 60 seconds to complete
    if (this.progress < 1) this.progress += progressRate * dt;
    this.progress = Math.min(this.progress, 1);
    // Planet approach
    if (this.progress >= 0.85) this.planetPhase = (this.progress - 0.85) / 0.15;
    // Asteroid spawning (thins out near planet)
    const spawnMult = this.progress > 0.85 ? Math.max(0, 1 - (this.progress-0.85)/0.1) : 1;
    const spawnInterval = lerp(1.5, 0.5, Math.min(1, elapsed/50)) * (1/spawnMult || 999);
    this.spawnTimer += dt;
    if (this.spawnTimer > spawnInterval && this.progress < 0.95) {
      this.spawnTimer = 0;
      const speed = lerp(120, 250, Math.min(1, elapsed/50));
      const radius = 15 + Math.random()*20;
      this.asteroids.push({
        x: VW + radius, y: 40 + Math.random()*(VH-80),
        vx: -speed*(0.8+Math.random()*0.4), vy: (Math.random()-0.5)*40,
        r: radius, variant: Math.floor(Math.random()*3),
        rot: Math.random()*Math.PI*2, rotSpd: (Math.random()-0.5)*2,
      });
    }
    // Star collectibles
    if (Math.random() < dt * 0.4 && this.progress < 0.9) {
      this.collectibles.push({
        x: VW + 20, y: 50 + Math.random()*(VH-100),
        vx: -100, r: 10,
      });
    }
    // Update asteroids
    for (let i = this.asteroids.length-1; i >= 0; i--) {
      const a = this.asteroids[i];
      a.x += a.vx * dt; a.y += a.vy * dt; a.rot += a.rotSpd * dt;
      if (a.x < -50) this.asteroids.splice(i, 1);
    }
    // Update collectibles
    for (let i = this.collectibles.length-1; i >= 0; i--) {
      const s = this.collectibles[i];
      s.x += s.vx * dt;
      if (s.x < -20) { this.collectibles.splice(i, 1); continue; }
      if (dist(s.x, s.y, this.shipX, this.shipY) < 35) {
        starCount++;
        SFX.starCollect();
        spawnParticles(s.x, s.y, 8, ['#ffd700','#ffee00','#fff'], 80, 0.5, 3);
        this.collectibles.splice(i, 1);
      }
    }
    // Collision
    this.invulnTimer = Math.max(0, this.invulnTimer - dt);
    if (this.invulnTimer <= 0) {
      for (let i = this.asteroids.length-1; i >= 0; i--) {
        const a = this.asteroids[i];
        const hitDist = a.r * 0.7 + 22; // generous hitbox
        if (dist(a.x, a.y, this.shipX, this.shipY) < hitDist) {
          hearts--;
          this.progress = Math.max(0, this.progress - 0.15);
          this.invulnTimer = 2;
          SFX.hit();
          SFX.heartLost();
          triggerShake(6, 0.3);
          spawnParticles(this.shipX, this.shipY, 12, ['#f80','#ff0','#f44'], 120, 0.6, 3);
          this.asteroids.splice(i, 1);
          if (hearts <= 0) {
            hearts = 3;
            this.progress = Math.max(0, this.progress - 0.1);
            this.setRobotMsg("I fixed the ship!");
          } else {
            this.setRobotMsg("Ouch! Hold on!");
          }
          break;
        }
      }
    }
    // Near miss detection
    this.dodgeCheckTimer += dt;
    if (this.dodgeCheckTimer > 0.5) {
      this.dodgeCheckTimer = 0;
      for (const a of this.asteroids) {
        const d = dist(a.x, a.y, this.shipX, this.shipY);
        if (d < a.r + 45 && d > a.r + 22) {
          if (Math.random() < 0.3) this.setRobotMsg(["Nice dodge!","Woohoo!","Close one!"][Math.floor(Math.random()*3)]);
          break;
        }
      }
    }
    // Robot chatter
    this.robotMsgTimer -= dt;
    if (this.robotMsgTimer <= 0) this.robotMsg = '';
    this.robotSilence += dt;
    if (this.robotSilence > 8) {
      const msgs = ["You got this!","Keep going!","Almost there!","Great flying!"];
      this.setRobotMsg(msgs[Math.floor(Math.random()*msgs.length)]);
    }
    // Progress milestones
    if (this.progress > 0.5 && this.progress < 0.52 && this.robotMsg !== "Halfway there!") this.setRobotMsg("Halfway there!");
    if (this.progress > 0.85 && this.progress < 0.87 && this.robotMsg !== "I see Planet Violet!") this.setRobotMsg("I see Planet Violet!");
    // Asteroid direction warnings
    if (this.robotSilence > 3) {
      for (const a of this.asteroids) {
        if (a.x > this.shipX && a.x < this.shipX + 200) {
          if (Math.abs(a.y - this.shipY) < 60) {
            const warnMsgs = a.y < this.shipY ? ["Go down!","Dodge down!"] : ["Go up!","Dodge up!"];
            this.setRobotMsg(warnMsgs[Math.floor(Math.random()*2)]);
            break;
          }
        }
      }
    }
    // Docking trigger
    if (this.progress >= 1 && !this.docking) {
      this.docking = true;
      this.dockTimer = 0;
      this.setRobotMsg("We made it!");
      SFX.victory();
    }
    updateParticles(dt);
  },
  draw(c) {
    // Background
    const grd = c.createLinearGradient(0, 0, 0, VH);
    grd.addColorStop(0, '#0a0020'); grd.addColorStop(1, '#100030');
    c.fillStyle = grd; c.fillRect(0, 0, VW, VH);
    // Starfield scrolling
    const scrollX = stateTime * 50;
    drawStarfield(c, this.stars, globalTime, [0.3, 0.7, 1.2], scrollX, 0);
    // Planet Violet (appears at 85%)
    if (this.planetPhase > 0) {
      const pr = 60 + this.planetPhase * 140;
      const px = VW + 100 - this.planetPhase * 200;
      c.fillStyle = '#6622aa';
      c.beginPath(); c.arc(px, VH/2, pr, 0, Math.PI*2); c.fill();
      c.fillStyle = 'rgba(150,100,200,0.3)';
      c.beginPath(); c.arc(px, VH/2, pr+15, 0, Math.PI*2); c.fill();
      // Ring
      c.strokeStyle = 'rgba(200,150,255,0.5)'; c.lineWidth = 3;
      c.beginPath(); c.ellipse(px, VH/2, pr+30, pr*0.3, 0.2, 0, Math.PI*2); c.stroke();
      // Spots
      c.fillStyle = 'rgba(100,50,150,0.4)';
      c.beginPath(); c.arc(px-pr*0.3, VH/2-pr*0.2, pr*0.15, 0, Math.PI*2); c.fill();
      c.beginPath(); c.arc(px+pr*0.2, VH/2+pr*0.3, pr*0.1, 0, Math.PI*2); c.fill();
    }
    // Asteroids
    this.asteroids.forEach(a => drawAsteroid(c, a.x, a.y, a.r, a.variant, a.rot));
    // Collectible stars
    this.collectibles.forEach(s => {
      const sparkle = 1 + Math.sin(globalTime*5)*0.2;
      drawStar(c, s.x, s.y, s.r*sparkle, 5, '#ffd700');
    });
    // Ship (blink when invulnerable)
    if (this.invulnTimer <= 0 || Math.sin(globalTime*20) > 0) {
      drawSpaceship(c, this.shipX, this.shipY, globalTime);
    }
    // Robot speech
    if (this.robotMsg) {
      drawSpeechBubble(c, this.shipX + 30, this.shipY - 45, this.robotMsg);
    }
    // HUD
    this.drawHUD(c);
    drawParticles(c);
  },
  drawHUD(c) {
    c.save();
    // Hearts
    for (let i = 0; i < 3; i++) {
      drawHeart(c, 30 + i*28, 25, 10, i < hearts);
    }
    // Progress bar
    const bw = 300, bh = 14;
    const bx = VW/2 - bw/2, by = 15;
    c.fillStyle = 'rgba(255,255,255,0.15)';
    c.fillRect(bx, by, bw, bh);
    const prog = clamp(this.progress, 0, 1);
    const gc = c.createLinearGradient(bx, 0, bx+bw*prog, 0);
    gc.addColorStop(0, '#8833cc'); gc.addColorStop(1, '#cc66ff');
    c.fillStyle = gc;
    c.fillRect(bx, by, bw*prog, bh);
    c.strokeStyle = '#fff'; c.lineWidth = 1;
    c.strokeRect(bx, by, bw, bh);
    c.font = '10px monospace'; c.fillStyle = '#fff';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText('Planet Violet', VW/2, by+bh/2);
    // Stars
    drawStar(c, VW-50, 22, 8, 5, '#ffd700');
    c.font = 'bold 14px monospace'; c.fillStyle = '#ffd700';
    c.textAlign = 'right';
    c.fillText('×' + starCount, VW-62, 24);
    c.restore();
  }
};

// ============================================================
// LEVEL 2: MOUNTAIN CLIMB
// ============================================================
states.LEVEL2_PLAYING = {
  // Player
  px: 0, py: 0, pvx: 0, pvy: 0, onGround: false, facing: 1,
  coyoteTimer: 0, jumpBufferTimer: 0, jumpHeld: false,
  highestShelf: 0, currentShelf: 0,
  // World
  platforms: [], fallingRocks: [], windGusts: [],
  cameraY: 0, targetCamY: 0,
  // Robot
  robotX: 0, robotY: 0, robotMsg: '', robotMsgTimer: 0, robotSilence: 0,
  // Collectibles
  batteries: [], boostTimer: 0, lvl2Stars: [],
  summitReached: false, summitTimer: 0, lastZone: 0,
  // Level params
  SHELF_COUNT: 30,
  SHELF_HEIGHT: 80,
  PLAT_MIN_W: 80,
  PLAT_MAX_W: 160,

  init() {
    hearts = 3;
    this.px = VW/2; this.py = 0;
    this.pvx = 0; this.pvy = 0;
    this.onGround = false; this.facing = 1;
    this.coyoteTimer = 0; this.jumpBufferTimer = 0; this.jumpHeld = false;
    this.highestShelf = 0; this.currentShelf = 0;
    this.cameraY = 0; this.targetCamY = 0;
    this.robotMsg = ''; this.robotMsgTimer = 0; this.robotSilence = 0;
    this.fallingRocks = []; this.windGusts = []; this.batteries = []; this.lvl2Stars = [];
    this.boostTimer = 0; this.summitReached = false; this.summitTimer = 0; this.lastZone = 0;
    this.invulnTimer = 0;
    particles = [];
    this.generatePlatforms();
    this.setRobotMsg("Let's climb!");
  },
  setRobotMsg(msg) {
    this.robotMsg = msg; this.robotMsgTimer = 2.5; this.robotSilence = 0;
    SFX.robotBeep();
  },
  generatePlatforms() {
    this.platforms = [];
    // Ground
    this.platforms.push({ x: 0, y: 20, w: VW, h: 15, zone: 0, isGround: true });
    for (let shelf = 1; shelf <= this.SHELF_COUNT; shelf++) {
      const y = -(shelf * this.SHELF_HEIGHT);
      const zone = shelf <= 10 ? 0 : (shelf <= 20 ? 1 : 2);
      // 2-3 platforms per shelf
      const count = 2 + (Math.random() < 0.4 ? 1 : 0);
      const usedX = [];
      for (let p = 0; p < count; p++) {
        const w = this.PLAT_MIN_W + Math.random() * (this.PLAT_MAX_W - this.PLAT_MIN_W);
        let px;
        let tries = 0;
        do {
          px = Math.random() * (VW - w);
          tries++;
        } while (tries < 20 && usedX.some(ux => Math.abs(ux - px) < w + 20));
        usedX.push(px);
        const icy = zone === 2 && Math.random() < 0.5;
        this.platforms.push({ x: px, y, w, h: 12, zone, shelf, icy });
      }
      // Star collectibles on every 3rd shelf
      if (shelf % 3 === 0) {
        this.lvl2Stars.push({
          x: 50 + Math.random()*(VW-100),
          y: y - 30,
          collected: false,
        });
      }
      // Battery pickups on some shelves
      if (shelf % 7 === 0) {
        this.batteries.push({
          x: VW/2 + (Math.random()-0.5)*300,
          y: y - 25,
          collected: false,
        });
      }
    }
    // Summit platform
    const summitY = -((this.SHELF_COUNT + 1) * this.SHELF_HEIGHT);
    this.platforms.push({
      x: VW/2 - 120, y: summitY, w: 240, h: 15, zone: 3, shelf: this.SHELF_COUNT + 1, isSummit: true
    });
  },
  getZone() {
    if (this.currentShelf <= 10) return 0;
    if (this.currentShelf <= 20) return 1;
    return 2;
  },
  update(dt) {
    if (this.summitReached) {
      this.summitTimer += dt;
      updateParticles(dt);
      if (this.summitTimer > 4 || (this.summitTimer > 1.5 && anyKeyJustPressed())) {
        changeState('LEVEL2_VICTORY');
      }
      return;
    }
    const zone = this.getZone();
    const speed = this.boostTimer > 0 ? 260 : 200;
    const jumpPower = this.boostTimer > 0 ? -480 : -400;
    const gravity = 700;
    const friction = (zone === 2 && this.onGround) ? 0.975 : 0.85;
    // Horizontal movement
    if (keys['ArrowLeft'] || keys['KeyA']) { this.pvx -= speed * 3 * dt; this.facing = -1; }
    if (keys['ArrowRight'] || keys['KeyD']) { this.pvx += speed * 3 * dt; this.facing = 1; }
    this.pvx *= friction;
    if (Math.abs(this.pvx) < 1) this.pvx = 0;
    this.pvx = clamp(this.pvx, -speed, speed);
    // Jump
    if (consumeJustPressed('ArrowUp') || consumeJustPressed('KeyW') || consumeJustPressed('Space')) {
      this.jumpBufferTimer = 0.1;
      this.jumpHeld = true;
    }
    if (!keys['ArrowUp'] && !keys['KeyW'] && !keys['Space']) this.jumpHeld = false;
    if (this.jumpBufferTimer > 0 && this.coyoteTimer > 0) {
      this.pvy = jumpPower;
      this.jumpBufferTimer = 0; this.coyoteTimer = 0;
      this.onGround = false;
      SFX.jump();
    }
    this.jumpBufferTimer -= dt;
    // Variable jump height
    if (!this.jumpHeld && this.pvy < jumpPower * 0.4) {
      this.pvy = jumpPower * 0.4;
    }
    // Gravity
    this.pvy += gravity * dt;
    // Wind gusts
    if (zone >= 1 && this.currentShelf >= 15) {
      if (Math.random() < dt * 0.15) {
        const dir = Math.random() < 0.5 ? -1 : 1;
        this.windGusts.push({
          x: dir > 0 ? -20 : VW+20, y: this.py + (Math.random()-0.5)*200,
          dir, timer: 2, force: 80 + Math.random()*60,
        });
        SFX.wind();
        this.setRobotMsg("Windy!");
      }
    }
    for (let i = this.windGusts.length-1; i >= 0; i--) {
      const w = this.windGusts[i];
      w.timer -= dt;
      if (w.timer <= 0) { this.windGusts.splice(i, 1); continue; }
      if (Math.abs(this.py - w.y) < 150) this.pvx += w.dir * w.force * dt;
    }
    // Move
    this.px += this.pvx * dt;
    this.py += this.pvy * dt;
    // Screen wrap horizontal
    if (this.px < -10) this.px = VW + 10;
    if (this.px > VW + 10) this.px = -10;
    // Platform collision
    this.onGround = false;
    const pw = 10, ph = 26; // player half-width, height
    for (const plat of this.platforms) {
      // Only collide when falling down (one-way platforms)
      if (this.pvy >= 0) {
        const playerBottom = this.py + ph;
        const prevBottom = playerBottom - this.pvy * dt;
        if (playerBottom >= plat.y && prevBottom <= plat.y + 4 &&
            this.px + pw > plat.x && this.px - pw < plat.x + plat.w) {
          this.py = plat.y - ph;
          if (this.pvy > 150) SFX.land();
          this.pvy = 0;
          this.onGround = true;
          this.coyoteTimer = 0.1;
          if (plat.shelf) this.currentShelf = Math.max(this.currentShelf, plat.shelf);
          if (plat.isSummit) {
            this.summitReached = true;
            this.summitTimer = 0;
            spawnConfetti(this.px, this.py - 20, 60);
            SFX.treasure();
            this.setRobotMsg("The summit!");
          }
          break;
        }
      }
    }
    if (this.onGround) this.coyoteTimer = 0.1;
    else this.coyoteTimer -= dt;
    // Fall safety - land on highest previously reached platform
    const fallLimit = 80; // below ground level
    if (this.py > fallLimit && this.highestShelf > 0) {
      // Find a platform on the highest reached shelf
      let bestPlat = null;
      for (const p of this.platforms) {
        if (p.shelf && p.shelf === this.highestShelf) { bestPlat = p; break; }
      }
      if (!bestPlat) {
        // Fallback: find any platform near highest shelf
        for (const p of this.platforms) {
          if (p.shelf && p.shelf <= this.highestShelf && (!bestPlat || p.shelf > bestPlat.shelf)) bestPlat = p;
        }
      }
      if (bestPlat) {
        this.py = bestPlat.y - ph - 5;
        this.px = bestPlat.x + bestPlat.w / 2;
      } else {
        this.py = 20 - ph - 5;
        this.px = VW / 2;
      }
      this.pvy = 0; this.pvx = 0;
      this.setRobotMsg("Hang on!");
    } else if (this.py > fallLimit && this.highestShelf === 0) {
      // Still on ground, just reset to ground
      this.py = 20 - ph - 5;
      this.px = VW/2;
      this.pvy = 0; this.pvx = 0;
    }
    // Update highest shelf
    this.highestShelf = Math.max(this.highestShelf, this.currentShelf);
    // Zone transition messages
    const newZone = this.getZone();
    if (newZone !== this.lastZone) {
      if (newZone === 1) this.setRobotMsg("Rocky zone!");
      else if (newZone === 2) this.setRobotMsg("Brr! Snow zone!");
      this.lastZone = newZone;
    }
    // Falling rocks
    if (this.currentShelf >= 8) {
      if (Math.random() < dt * (0.1 + (this.currentShelf - 8) * 0.01)) {
        const rx = this.px + (Math.random()-0.5)*300;
        const ry = this.cameraY - 80;
        this.fallingRocks.push({
          x: rx, y: ry, vy: 0, r: 8 + Math.random()*6,
          warningTimer: 1, active: false,
        });
        this.setRobotMsg("Rock falling!");
      }
    }
    for (let i = this.fallingRocks.length-1; i >= 0; i--) {
      const rock = this.fallingRocks[i];
      if (rock.warningTimer > 0) {
        rock.warningTimer -= dt;
        if (rock.warningTimer <= 0) { rock.active = true; SFX.rockFall(); }
      } else {
        rock.vy += 400 * dt;
        rock.y += rock.vy * dt;
      }
      if (rock.y > this.cameraY + VH + 50) { this.fallingRocks.splice(i, 1); continue; }
      // Hit player
      if (rock.active && this.invulnTimer <= 0 &&
          dist(rock.x, rock.y, this.px, this.py) < rock.r + 12) {
        hearts--;
        this.invulnTimer = 2;
        SFX.hit(); SFX.heartLost();
        triggerShake(6, 0.3);
        spawnParticles(this.px, this.py, 10, ['#888','#aaa','#666'], 100, 0.5, 2);
        this.fallingRocks.splice(i, 1);
        if (hearts <= 0) {
          hearts = 3;
          this.setRobotMsg("You're okay!");
        } else {
          this.setRobotMsg("Watch out!");
        }
      }
    }
    this.invulnTimer = Math.max(0, (this.invulnTimer || 0) - dt);
    // Star collectibles
    for (const s of this.lvl2Stars) {
      if (!s.collected && dist(this.px, this.py, s.x, s.y) < 25) {
        s.collected = true;
        starCount++;
        SFX.starCollect();
        spawnParticles(s.x, s.y, 8, ['#ffd700','#ffee00','#fff'], 80, 0.5, 3);
      }
    }
    // Batteries
    for (const b of this.batteries) {
      if (!b.collected && dist(this.px, this.py, b.x, b.y) < 25) {
        b.collected = true;
        this.boostTimer = 5;
        SFX.powerUp();
        spawnParticles(b.x, b.y, 12, ['#0ff','#0f0','#ff0'], 100, 0.5, 3);
        this.setRobotMsg("Power up!");
      }
    }
    this.boostTimer = Math.max(0, this.boostTimer - dt);
    // Camera
    this.targetCamY = this.py - VH * 0.55;
    this.cameraY = lerp(this.cameraY, this.targetCamY, dt * 4);
    // Robot AI
    this.robotX = lerp(this.robotX, this.px + 40 * this.facing, dt * 3);
    this.robotY = lerp(this.robotY, this.py - 15, dt * 3);
    this.robotMsgTimer -= dt;
    if (this.robotMsgTimer <= 0) this.robotMsg = '';
    this.robotSilence += dt;
    if (this.robotSilence > 8) {
      const msgs = ["Jump, Priya!", "Keep climbing!", "You can do it!", "So high up!"];
      this.setRobotMsg(msgs[Math.floor(Math.random()*msgs.length)]);
    }
    updateParticles(dt);
  },
  draw(c) {
    const zone = this.getZone();
    // Sky gradient based on zone
    const grd = c.createLinearGradient(0, 0, 0, VH);
    if (zone === 0) {
      grd.addColorStop(0, '#4488cc'); grd.addColorStop(1, '#88bbdd');
    } else if (zone === 1) {
      grd.addColorStop(0, '#334466'); grd.addColorStop(1, '#556688');
    } else {
      grd.addColorStop(0, '#223344'); grd.addColorStop(1, '#445566');
    }
    c.fillStyle = grd; c.fillRect(0, 0, VW, VH);
    // Distant mountains (parallax)
    c.fillStyle = zone === 0 ? '#3a6633' : (zone === 1 ? '#444466' : '#556677');
    c.beginPath(); c.moveTo(0, VH);
    for (let mx = 0; mx <= VW; mx += 100) {
      const my = VH*0.5 + Math.sin(mx*0.005+1)*80 + Math.sin(mx*0.01)*40 - this.cameraY*0.1;
      c.lineTo(mx, my);
    }
    c.lineTo(VW, VH); c.closePath(); c.fill();
    c.save();
    c.translate(0, -this.cameraY);
    // Platforms
    for (const p of this.platforms) {
      if (p.y + p.h < this.cameraY - 20 || p.y > this.cameraY + VH + 20) continue;
      if (p.isSummit) {
        // Gold summit
        c.fillStyle = '#ffd700';
        c.fillRect(p.x, p.y, p.w, p.h);
        c.strokeStyle = '#cc8800'; c.lineWidth = 2;
        c.strokeRect(p.x, p.y, p.w, p.h);
        // Flag
        c.fillStyle = '#f44';
        c.fillRect(p.x + p.w/2 - 1, p.y - 40, 3, 40);
        c.beginPath();
        c.moveTo(p.x+p.w/2+2, p.y-40);
        c.lineTo(p.x+p.w/2+25, p.y-32);
        c.lineTo(p.x+p.w/2+2, p.y-24);
        c.closePath(); c.fill();
        // Treasure chest
        drawTreasureChest(c, p.x + p.w/2, p.y - 25, this.summitReached ? Math.min(1, this.summitTimer*0.5) : 0);
        continue;
      }
      if (p.icy) {
        c.fillStyle = '#d0e8f8';
        c.fillRect(p.x, p.y, p.w, p.h);
        // Ice shine
        c.fillStyle = 'rgba(255,255,255,0.4)';
        c.fillRect(p.x+4, p.y+2, p.w-8, 3);
      } else if (p.zone === 0 || p.isGround) {
        c.fillStyle = '#4a8c3f';
        c.fillRect(p.x, p.y, p.w, p.h);
        // Grass tufts
        c.fillStyle = '#5aaa4a';
        for (let gx = p.x+5; gx < p.x+p.w-5; gx += 8) {
          c.fillRect(gx, p.y-2, 3, 4);
        }
      } else if (p.zone === 1) {
        c.fillStyle = '#888888';
        c.fillRect(p.x, p.y, p.w, p.h);
        c.fillStyle = '#777';
        c.fillRect(p.x+3, p.y+3, p.w*0.3, p.h-6);
      } else {
        c.fillStyle = '#ccccdd';
        c.fillRect(p.x, p.y, p.w, p.h);
        c.fillStyle = '#eee';
        c.fillRect(p.x+2, p.y+1, p.w-4, 3);
      }
    }
    // Falling rock warnings and rocks
    for (const rock of this.fallingRocks) {
      if (rock.warningTimer > 0) {
        // Warning shadow
        c.fillStyle = `rgba(255,0,0,${0.3 + Math.sin(globalTime*10)*0.2})`;
        c.beginPath(); c.ellipse(rock.x, rock.y + 200, rock.r*2, rock.r*0.8, 0, 0, Math.PI*2); c.fill();
      } else if (rock.active) {
        c.fillStyle = '#776655';
        c.beginPath(); c.arc(rock.x, rock.y, rock.r, 0, Math.PI*2); c.fill();
        c.fillStyle = '#665544';
        c.beginPath(); c.arc(rock.x-2, rock.y-2, rock.r*0.7, 0, Math.PI*2); c.fill();
      }
    }
    // Star collectibles
    for (const s of this.lvl2Stars) {
      if (s.collected) continue;
      const sy2 = s.y + Math.sin(globalTime*3 + s.x)*5;
      const sparkle = 1 + Math.sin(globalTime*5 + s.x)*0.2;
      drawStar(c, s.x, sy2, 8*sparkle, 5, '#ffd700');
    }
    // Batteries
    for (const b of this.batteries) {
      if (b.collected) continue;
      const by = b.y + Math.sin(globalTime*3)*4;
      c.fillStyle = '#0f0';
      c.fillRect(b.x-6, by-8, 12, 16);
      c.fillStyle = '#0a0';
      c.fillRect(b.x-3, by-10, 6, 3);
      c.fillStyle = '#ff0';
      // Lightning bolt
      c.beginPath(); c.moveTo(b.x+2, by-5); c.lineTo(b.x-2, by+1);
      c.lineTo(b.x+1, by+1); c.lineTo(b.x-2, by+6);
      c.lineTo(b.x+3, by-1); c.lineTo(b.x, by-1); c.closePath(); c.fill();
    }
    // Wind visual
    for (const w of this.windGusts) {
      if (w.timer > 0) {
        c.globalAlpha = w.timer * 0.3;
        c.strokeStyle = '#fff'; c.lineWidth = 1;
        for (let l = 0; l < 5; l++) {
          const lx = w.x + w.dir * (2-w.timer) * 200 + l * 30 * w.dir;
          const ly = w.y + (l-2)*30;
          c.beginPath(); c.moveTo(lx, ly);
          c.lineTo(lx + w.dir*20, ly + Math.sin(lx*0.1)*5);
          c.stroke();
        }
        c.globalAlpha = 1;
      }
    }
    // Robot
    const rx = this.robotX, ry = this.robotY;
    drawRobotJetFlames(c, rx, ry, 0.8, globalTime);
    drawRobot(c, rx, ry, 0.8, globalTime, this.boostTimer > 0 ? 'excited' : 'happy');
    if (this.robotMsg) drawSpeechBubble(c, rx, ry - 25, this.robotMsg);
    // Boost glow on robot
    if (this.boostTimer > 0) {
      c.globalAlpha = 0.3 + Math.sin(globalTime*8)*0.2;
      c.fillStyle = '#0ff';
      c.beginPath(); c.arc(rx, ry, 18, 0, Math.PI*2); c.fill();
      c.globalAlpha = 1;
    }
    // Priya (blink when invulnerable)
    if ((this.invulnTimer || 0) <= 0 || Math.sin(globalTime*20) > 0) {
      drawPriyaFull(c, this.px, this.py, 1, this.onGround && Math.abs(this.pvx) > 10 ? globalTime : 0, this.facing);
      // Boost glow on Priya
      if (this.boostTimer > 0) {
        c.globalAlpha = 0.2 + Math.sin(globalTime*8)*0.1;
        c.fillStyle = '#ff0';
        c.beginPath(); c.arc(this.px, this.py + 5, 20, 0, Math.PI*2); c.fill();
        c.globalAlpha = 1;
      }
    }
    drawParticles(c);
    c.restore();
    // HUD
    this.drawHUD(c);
    // Snow particles in snow zone
    if (zone === 2) {
      c.fillStyle = 'rgba(255,255,255,0.6)';
      for (let i = 0; i < 30; i++) {
        const sx = (globalTime*30 + i*97.3) % VW;
        const sy = (globalTime*50 + i*137.5) % VH;
        c.beginPath(); c.arc(sx, sy, 1.5, 0, Math.PI*2); c.fill();
      }
    }
  },
  drawHUD(c) {
    c.save();
    // Hearts
    for (let i = 0; i < 3; i++) drawHeart(c, 30+i*28, 25, 10, i < hearts);
    // Vertical progress bar
    const bw = 300, bh = 14;
    const bx = VW/2 - bw/2, by = 15;
    c.fillStyle = 'rgba(255,255,255,0.15)';
    c.fillRect(bx, by, bw, bh);
    const prog = clamp(this.currentShelf / this.SHELF_COUNT, 0, 1);
    const gc = c.createLinearGradient(bx, 0, bx+bw*prog, 0);
    gc.addColorStop(0, '#44aa44'); gc.addColorStop(1, '#88ff88');
    c.fillStyle = gc;
    c.fillRect(bx, by, bw*prog, bh);
    c.strokeStyle = '#fff'; c.lineWidth = 1;
    c.strokeRect(bx, by, bw, bh);
    c.font = '10px monospace'; c.fillStyle = '#fff';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText('Summit', VW/2, by+bh/2);
    // Stars
    drawStar(c, VW-50, 22, 8, 5, '#ffd700');
    c.font = 'bold 14px monospace'; c.fillStyle = '#ffd700';
    c.textAlign = 'right'; c.fillText('×' + starCount, VW-62, 24);
    c.restore();
  }
};

// ============================================================
// LEVEL 3 PLAYING - Planet Ordering Puzzle
// ============================================================
states.LEVEL3_PLAYING = {
  planets: [], slots: [], selectedPlanet: null, solved: false,
  robotMsg: '', robotMsgTimer: 0, robotSilence: 0, hintCount: 0,
  init() {
    // Planet data: name, color, size, correctIndex (0-7 from Sun)
    const planetData = [
      { name: 'Mercury', color: '#8c7853', size: 18, correctIndex: 0 },
      { name: 'Venus', color: '#ffd97d', size: 28, correctIndex: 1 },
      { name: 'Earth', color: '#4169e1', size: 30, correctIndex: 2 },
      { name: 'Mars', color: '#cd5c5c', size: 24, correctIndex: 3 },
      { name: 'Jupiter', color: '#daa520', size: 50, correctIndex: 4 },
      { name: 'Saturn', color: '#f4a460', size: 45, correctIndex: 5 },
      { name: 'Uranus', color: '#4fd0e0', size: 38, correctIndex: 6 },
      { name: 'Neptune', color: '#4169e1', size: 36, correctIndex: 7 }
    ];

    // Shuffle planets and place on left side
    const shuffled = [...planetData].sort(() => Math.random() - 0.5);
    this.planets = shuffled.map((p, i) => ({
      ...p,
      x: 100,
      y: 120 + i * 55,
      currentSlot: null,
      isSelected: false
    }));

    // Create slots on right side
    this.slots = planetData.map((p, i) => ({
      x: 600,
      y: 120 + i * 55,
      correctName: p.name,
      planet: null
    }));

    this.selectedPlanet = null;
    this.solved = false;
    this.robotMsg = 'Click a planet, then click a slot!';
    this.robotMsgTimer = 3;
    this.robotSilence = 0;
    this.hintCount = 0;
  },
  setRobotMsg(msg) {
    this.robotMsg = msg;
    this.robotMsgTimer = 2.5;
    this.robotSilence = 0;
    SFX.robotBeep();
  },
  update(dt) {
    this.robotMsgTimer -= dt;
    this.robotSilence += dt;

    // Robot hints
    if (this.robotSilence > 18 && !this.solved) {
      const hints = [
        'Start with the closest planet to the Sun!',
        'Mercury is the smallest and first!',
        'Earth is the third planet!',
        'Jupiter is the biggest, it\'s 5th!',
        'Saturn has rings, it comes after Jupiter!'
      ];
      if (this.hintCount < hints.length) {
        this.setRobotMsg(hints[this.hintCount]);
        this.hintCount++;
      } else {
        this.setRobotMsg('You can do it!');
      }
    }

    // Handle mouse clicks
    if (consumeMouseClick()) {
      // Check if clicked on a planet
      let clickedPlanet = null;
      for (const planet of this.planets) {
        const px = planet.currentSlot === null ? planet.x : this.slots[planet.currentSlot].x;
        const py = planet.currentSlot === null ? planet.y : this.slots[planet.currentSlot].y;
        const dist = Math.hypot(mouseX - px, mouseY - py);
        if (dist < planet.size / 2 + 5) {
          clickedPlanet = planet;
          break;
        }
      }

      if (clickedPlanet) {
        // Select planet
        if (this.selectedPlanet) this.selectedPlanet.isSelected = false;
        this.selectedPlanet = clickedPlanet;
        clickedPlanet.isSelected = true;
        SFX.buttonSelect();
      } else if (this.selectedPlanet) {
        // Check if clicked on a slot
        for (let i = 0; i < this.slots.length; i++) {
          const slot = this.slots[i];
          const inSlot = Math.abs(mouseX - slot.x) < 80 && Math.abs(mouseY - slot.y) < 30;
          if (inSlot) {
            // Remove selected planet from its current slot
            if (this.selectedPlanet.currentSlot !== null) {
              this.slots[this.selectedPlanet.currentSlot].planet = null;
            }

            // If target slot has a planet, swap it
            if (slot.planet) {
              const swapPlanet = slot.planet;
              if (this.selectedPlanet.currentSlot !== null) {
                this.slots[this.selectedPlanet.currentSlot].planet = swapPlanet;
                swapPlanet.currentSlot = this.selectedPlanet.currentSlot;
              } else {
                swapPlanet.currentSlot = null;
              }
            }

            // Place selected planet in slot
            slot.planet = this.selectedPlanet;
            this.selectedPlanet.currentSlot = i;
            this.selectedPlanet.isSelected = false;
            this.selectedPlanet = null;
            SFX.buttonSelect();

            // Check if puzzle is solved
            let allCorrect = true;
            for (let j = 0; j < this.slots.length; j++) {
              const s = this.slots[j];
              if (!s.planet || s.planet.correctIndex !== j) {
                allCorrect = false;
                break;
              }
            }

            if (allCorrect && !this.solved) {
              this.solved = true;
              this.setRobotMsg('Perfect! You\'re a space scientist!');
              SFX.victory();
              setTimeout(() => changeState('LEVEL3_VICTORY'), 1500);
            }
            break;
          }
        }
      }
    }
  },
  draw(c) {
    // Deep space background
    const grd = c.createLinearGradient(0, 0, 0, VH);
    grd.addColorStop(0, '#0a0030'); grd.addColorStop(1, '#1a0050');
    c.fillStyle = grd; c.fillRect(0, 0, VW, VH);

    // Stars
    for (let i = 0; i < 100; i++) {
      const x = (i * 123 + globalTime * 10) % VW;
      const y = (i * 456) % VH;
      c.fillStyle = 'rgba(255,255,255,0.3)';
      c.fillRect(x, y, 1, 1);
    }

    // Title
    c.save(); c.textAlign = 'center'; c.textBaseline = 'middle';
    c.font = 'bold 24px monospace'; c.fillStyle = '#20c997';
    c.fillText('Order the Planets from the Sun', VW/2, 40);

    // Draw Sun at top
    c.fillStyle = '#ffa500';
    c.beginPath(); c.arc(600, 80, 30, 0, Math.PI*2); c.fill();
    c.fillStyle = '#ffff00';
    c.beginPath(); c.arc(600, 80, 25, 0, Math.PI*2); c.fill();

    // Draw slots with labels
    c.textAlign = 'left';
    for (let i = 0; i < this.slots.length; i++) {
      const slot = this.slots[i];
      const isCorrect = slot.planet && slot.planet.correctIndex === i;
      const isFilled = slot.planet !== null;

      c.strokeStyle = isCorrect ? '#00ff00' : (isFilled ? '#ff6666' : '#666');
      c.lineWidth = isCorrect ? 3 : 2;
      c.strokeRect(slot.x - 80, slot.y - 25, 160, 50);

      c.font = '16px monospace';
      c.fillStyle = '#aaa';
      c.fillText((i + 1), slot.x - 70, slot.y);

      if (isCorrect) {
        c.fillStyle = '#00ff00';
        c.font = 'bold 20px monospace';
        c.fillText('✓', slot.x + 60, slot.y);
      }
    }

    // Draw planets
    for (const planet of this.planets) {
      const px = planet.currentSlot === null ? planet.x : this.slots[planet.currentSlot].x;
      const py = planet.currentSlot === null ? planet.y : this.slots[planet.currentSlot].y;

      // Glow if selected
      if (planet.isSelected) {
        c.fillStyle = 'rgba(255,215,0,0.3)';
        c.beginPath(); c.arc(px, py, planet.size/2 + 8, 0, Math.PI*2); c.fill();
      }

      // Planet
      c.fillStyle = planet.color;
      c.beginPath(); c.arc(px, py, planet.size/2, 0, Math.PI*2); c.fill();
      c.strokeStyle = '#fff';
      c.lineWidth = 1;
      c.stroke();

      // Planet name
      c.textAlign = 'center';
      c.font = '12px monospace';
      c.fillStyle = '#fff';
      if (planet.currentSlot === null) {
        c.fillText(planet.name, px, py + planet.size/2 + 15);
      }
    }

    // Draw Yasmin
    drawYasmin(c, 100, VH - 80, 1.5, globalTime);

    // Draw Robot Bunny with message
    const mood = this.solved ? 'excited' : 'happy';
    drawRobotBunny(c, 700, VH - 80, 1.5, globalTime, mood);
    if (this.robotMsgTimer > 0) {
      drawSpeechBubble(c, 700, VH - 130, this.robotMsg);
    }

    c.restore();
  }
};

// ============================================================
states.LEVEL4_PLAYING = {
  yasminX: 400, yasminY: 300, yasminVx: 0, yasminVy: 0, yasminFacing: 1,
  butterflies: [], butterfliesCaught: 0, gameTime: 60,
  robotMsg: '', robotMsgTimer: 0, robotSilence: 0,
  flowers: [],
  init() {
    this.yasminX = 400;
    this.yasminY = 300;
    this.yasminVx = 0;
    this.yasminVy = 0;
    this.yasminFacing = 1;
    this.butterfliesCaught = 0;
    this.gameTime = 60;
    this.robotMsg = 'Chase the butterflies!';
    this.robotMsgTimer = 3;
    this.robotSilence = 0;

    // Create butterflies
    this.butterflies = [];
    for (let i = 0; i < 12; i++) {
      this.butterflies.push({
        x: 100 + Math.random() * 600,
        y: 80 + Math.random() * 400,
        vx: (Math.random() - 0.5) * 80,
        vy: (Math.random() - 0.5) * 80,
        color: ['#ff69b4', '#ffd700', '#ff1493', '#9370db', '#00ffff', '#ffb6c1'][i % 6],
        phase: Math.random() * Math.PI * 2,
        fleeing: false
      });
    }

    // Create flowers on ground
    this.flowers = [];
    for (let i = 0; i < 30; i++) {
      this.flowers.push({
        x: Math.random() * VW,
        y: VH - 50 + Math.random() * 30,
        color: ['#ff69b4', '#ffd700', '#9370db', '#ff1493'][Math.floor(Math.random() * 4)],
        size: 3 + Math.random() * 2
      });
    }
  },
  setRobotMsg(msg) {
    this.robotMsg = msg;
    this.robotMsgTimer = 2.5;
    this.robotSilence = 0;
    SFX.robotBeep();
  },
  update(dt) {
    this.robotMsgTimer -= dt;
    this.robotSilence += dt;
    this.gameTime -= dt;

    // Check if time is up
    if (this.gameTime <= 0) {
      this.gameTime = 0;
      changeState('LEVEL4_VICTORY');
      return;
    }

    // Robot encouragement
    if (this.robotSilence > 10) {
      const msgs = [
        'You\'re doing great!',
        'Keep going!',
        'They\'re so fast!',
        'Almost there!',
        'Catch them all!'
      ];
      this.setRobotMsg(msgs[Math.floor(Math.random() * msgs.length)]);
    }

    // Yasmin movement
    const speed = 450;
    const friction = 0.80;

    if (keys['ArrowLeft'] || keys['KeyA']) {
      this.yasminVx -= speed * 3 * dt;
      this.yasminFacing = -1;
    }
    if (keys['ArrowRight'] || keys['KeyD']) {
      this.yasminVx += speed * 3 * dt;
      this.yasminFacing = 1;
    }
    if (keys['ArrowUp'] || keys['KeyW']) {
      this.yasminVy -= speed * 3 * dt;
    }
    if (keys['ArrowDown'] || keys['KeyS']) {
      this.yasminVy += speed * 3 * dt;
    }

    this.yasminVx *= friction;
    this.yasminVy *= friction;
    this.yasminVx = Math.max(-speed, Math.min(speed, this.yasminVx));
    this.yasminVy = Math.max(-speed, Math.min(speed, this.yasminVy));

    this.yasminX += this.yasminVx * dt;
    this.yasminY += this.yasminVy * dt;

    // Keep Yasmin in bounds
    this.yasminX = Math.max(30, Math.min(VW - 30, this.yasminX));
    this.yasminY = Math.max(60, Math.min(VH - 60, this.yasminY));

    // Update butterflies
    for (let i = this.butterflies.length - 1; i >= 0; i--) {
      const b = this.butterflies[i];
      b.phase += dt * 8;

      // Check distance to Yasmin
      const dist = Math.hypot(this.yasminX - b.x, this.yasminY - b.y);

      if (dist < 25) {
        // Caught!
        this.butterflies.splice(i, 1);
        this.butterfliesCaught++;
        SFX.starCollect();
        this.setRobotMsg('Nice catch!');
        continue;
      }

      // Flee if Yasmin is close
      if (dist < 120) {
        b.fleeing = true;
        const angle = Math.atan2(b.y - this.yasminY, b.x - this.yasminX);
        b.vx = Math.cos(angle) * 200;
        b.vy = Math.sin(angle) * 200;
      } else {
        b.fleeing = false;
        // Random wandering
        b.vx += (Math.random() - 0.5) * 100 * dt;
        b.vy += (Math.random() - 0.5) * 100 * dt;
      }

      // Limit butterfly speed
      const maxSpeed = b.fleeing ? 200 : 60;
      const bSpeed = Math.hypot(b.vx, b.vy);
      if (bSpeed > maxSpeed) {
        b.vx = (b.vx / bSpeed) * maxSpeed;
        b.vy = (b.vy / bSpeed) * maxSpeed;
      }

      b.x += b.vx * dt;
      b.y += b.vy * dt;

      // Bounce off walls
      if (b.x < 20 || b.x > VW - 20) {
        b.vx *= -0.8;
        b.x = Math.max(20, Math.min(VW - 20, b.x));
      }
      if (b.y < 60 || b.y > VH - 60) {
        b.vy *= -0.8;
        b.y = Math.max(60, Math.min(VH - 60, b.y));
      }
    }
  },
  draw(c) {
    // Planet Violet sky gradient
    const grd = c.createLinearGradient(0, 0, 0, VH);
    grd.addColorStop(0, '#9370db');
    grd.addColorStop(0.6, '#8a4fb5');
    grd.addColorStop(1, '#6a3d9a');
    c.fillStyle = grd;
    c.fillRect(0, 0, VW, VH);

    // Stars in background
    c.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i = 0; i < 50; i++) {
      const sx = (i * 137.5) % VW;
      const sy = (i * 97.3) % (VH * 0.5);
      c.fillRect(sx, sy, 1, 1);
    }

    // Ground (violet grass)
    c.fillStyle = '#7a5c99';
    c.fillRect(0, VH - 60, VW, 60);

    // Flowers
    for (const flower of this.flowers) {
      c.fillStyle = flower.color;
      c.beginPath();
      for (let i = 0; i < 5; i++) {
        const angle = (i / 5) * Math.PI * 2;
        const r = flower.size;
        c.lineTo(flower.x + Math.cos(angle) * r, flower.y + Math.sin(angle) * r);
      }
      c.fill();
      // Flower center
      c.fillStyle = '#ffd700';
      c.beginPath();
      c.arc(flower.x, flower.y, flower.size * 0.4, 0, Math.PI * 2);
      c.fill();
    }

    // Draw butterflies
    for (const b of this.butterflies) {
      const wingFlap = Math.sin(b.phase) * 0.3;
      c.save();
      c.translate(b.x, b.y);

      // Body
      c.fillStyle = '#222';
      c.fillRect(-1, -6, 2, 12);

      // Wings
      c.fillStyle = b.color;
      c.strokeStyle = '#fff';
      c.lineWidth = 0.5;

      // Left wings
      c.save();
      c.rotate(wingFlap);
      c.beginPath();
      c.ellipse(-6, -4, 8, 6, 0, 0, Math.PI * 2);
      c.fill();
      c.stroke();
      c.beginPath();
      c.ellipse(-6, 4, 8, 6, 0, 0, Math.PI * 2);
      c.fill();
      c.stroke();
      c.restore();

      // Right wings
      c.save();
      c.rotate(-wingFlap);
      c.beginPath();
      c.ellipse(6, -4, 8, 6, 0, 0, Math.PI * 2);
      c.fill();
      c.stroke();
      c.beginPath();
      c.ellipse(6, 4, 8, 6, 0, 0, Math.PI * 2);
      c.fill();
      c.stroke();
      c.restore();

      // Antennae
      c.strokeStyle = '#222';
      c.lineWidth = 1;
      c.beginPath();
      c.moveTo(0, -6);
      c.lineTo(-3, -10);
      c.moveTo(0, -6);
      c.lineTo(3, -10);
      c.stroke();

      c.restore();
    }

    // Draw Yasmin
    c.save();
    if (this.yasminFacing < 0) c.scale(-1, 1);
    drawYasmin(c, this.yasminFacing < 0 ? -this.yasminX : this.yasminX, this.yasminY, 1.5, globalTime);
    c.restore();

    // Draw Robot Bunny
    drawRobotBunny(c, VW - 80, VH - 60, 1.2, globalTime, 'happy');
    if (this.robotMsgTimer > 0) {
      drawSpeechBubble(c, VW - 80, VH - 120, this.robotMsg);
    }

    // UI
    c.save();
    c.textAlign = 'left';
    c.textBaseline = 'top';
    c.font = 'bold 20px monospace';
    c.fillStyle = '#fff';
    c.strokeStyle = '#000';
    c.lineWidth = 3;
    c.strokeText('Butterflies: ' + this.butterfliesCaught, 20, 20);
    c.fillText('Butterflies: ' + this.butterfliesCaught, 20, 20);
    c.strokeText('Time: ' + Math.ceil(this.gameTime) + 's', 20, 50);
    c.fillText('Time: ' + Math.ceil(this.gameTime) + 's', 20, 50);
    c.restore();
  }
};

    this.yasminVy = 0;
    this.yasminFacing = 1;
    this.asteroids = [];

    this.gameTime = 60;
    this.robotMsg = 'Shoot the asteroids!';
    this.robotMsgTimer = 3;
    this.robotSilence = 0;

    // Create asteroids
    for (let i = 0; i < this.totalAsteroids; i++) {
      this.asteroids.push({
        x: 100 + Math.random() * 600,
        y: 80 + Math.random() * 450,
        vx: (Math.random() - 0.5) * 60,

      });

  },
  setRobotMsg(msg) {

    this.robotMsgTimer = 2.5;
    this.robotSilence = 0;
    SFX.robotBeep();
  },
  update(dt) {
    this.robotMsgTimer -= dt;
    this.robotSilence += dt;
    this.gameTime -= dt;

    // Check if time is up
    if (this.gameTime <= 0) {
      this.gameTime = 0;
      changeState('LEVEL5_VICTORY');
      return;
    }

    // Check if all asteroids destroyed
    if (this.asteroids.length === 0) {
      changeState('LEVEL5_VICTORY');
      return;
    }

    // Robot encouragement
    if (this.robotSilence > 10) {
      const msgs = [
        'Keep shooting!',
        'Great aim!',
        'Destroy them all!',
        'You can do it!',
        'Almost there!'
      ];
      this.setRobotMsg(msgs[Math.floor(Math.random() * msgs.length)]);
    }

    // Yasmin movement
    const speed = 350;
    const friction = 0.82;

    if (keys['ArrowLeft'] || keys['KeyA']) {
      this.yasminVx -= speed * 3 * dt;
      this.yasminFacing = -1;
    }
    if (keys['ArrowRight'] || keys['KeyD']) {
      this.yasminVx += speed * 3 * dt;
      this.yasminFacing = 1;
    }
    if (keys['ArrowUp'] || keys['KeyW']) {
      this.yasminVy -= speed * 3 * dt;
    }
    if (keys['ArrowDown'] || keys['KeyS']) {
      this.yasminVy += speed * 3 * dt;
    }

    this.yasminVx *= friction;
    this.yasminVy *= friction;
    this.yasminVx = Math.max(-speed, Math.min(speed, this.yasminVx));
    this.yasminVy = Math.max(-speed, Math.min(speed, this.yasminVy));

    this.yasminX += this.yasminVx * dt;
    this.yasminY += this.yasminVy * dt;

    // Keep Yasmin in bounds
    this.yasminX = Math.max(30, Math.min(VW - 30, this.yasminX));
    this.yasminY = Math.max(30, Math.min(VH - 30, this.yasminY));

        x: this.yasminX + this.yasminFacing * 15,

      // Check collision with asteroids

      if (a.x - a.size/2 < 0 || a.x + a.size/2 > VW) {

        a.x = Math.max(a.size/2, Math.min(VW - a.size/2, a.x));
